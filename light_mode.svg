    <filter id="shadow" x="-20" y="-20" width="1015" height="460" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="975" height="420" rx="24" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="32" y="32" width="911" height="356" rx="24" fill="#ffffff"/>
