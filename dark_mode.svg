  <text x="222" y="182" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#cbd5e1">Building practical projects across engineering, automation, and product-focused development.</text>

  <rect x="64" y="234" width="170" height="42" rx="21" fill="#0b2948"/>
  <text x="149" y="261" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#7dd3fc">C++ • Python • JS</text>

