<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="975" height="420" viewBox="0 0 975 420" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Shashwat GitHub profile banner</title>
  <desc id="desc">A clean dark-themed profile card with brief intro, focus areas, and links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="975" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1015" height="460" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="975" height="420" rx="24" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="32" y="32" width="911" height="356" rx="24" fill="#111827" stroke="#1f2937"/>
  </g>

  <rect x="64" y="72" width="124" height="124" rx="28" fill="url(#accent)"/>
  <text x="126" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">S</text>

